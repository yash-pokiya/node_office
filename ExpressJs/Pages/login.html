<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login - Light Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-sans bg-gradient-to-br from-teal-100 via-blue-100 to-purple-100 relative overflow-hidden">

    <div class="absolute top-0 left-10 w-80 h-80 bg-purple-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-pulse"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-teal-300 rounded-full mix-blend-multiply filter blur-[120px] opacity-60"></div>

    <div class="relative w-full max-w-md px-8 py-10 mx-4 overflow-hidden rounded-[2rem] bg-white/40 backdrop-blur-xl border border-white/60 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)]">
        
        <div class="relative z-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-2 tracking-wide">Welcome Back</h2>
                <p class="text-slate-500 text-sm">Please enter your details to sign in.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="email">Email Address</label>
                    <input type="email" id="email" 
                        class="w-full px-4 py-3 rounded-xl bg-white/50 border border-white/60 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-400/50 focus:border-transparent transition-all duration-300 shadow-sm"
                        placeholder="you@example.com" required>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-sm font-semibold text-slate-700" for="password">Password</label>
                        <a href="#" class="text-xs text-purple-600 hover:text-purple-800 font-medium transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="password" 
                        class="w-full px-4 py-3 rounded-xl bg-white/50 border border-white/60 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-400/50 focus:border-transparent transition-all duration-300 shadow-sm"
                        placeholder="••••••••" required>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" 
                        class="w-4 h-4 rounded border-slate-300 bg-white/50 text-purple-600 focus:ring-purple-500/50 focus:ring-offset-0 cursor-pointer">
                    <label for="remember" class="ml-2 block text-sm font-medium text-slate-600 cursor-pointer transition-colors hover:text-slate-800">Remember me</label>
                </div>

                <button type="submit"
                    class="w-full py-3.5 px-4 flex justify-center rounded-xl bg-purple-600/90 hover:bg-purple-700 text-white font-semibold backdrop-blur-md shadow-lg transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:shadow-xl">
                    Sign In
                </button>
            </form>

            <p class="mt-8 text-center text-sm font-medium text-slate-600">
                Don't have an account?
                <a href="#" class="text-purple-600 hover:text-purple-800 transition-colors">Sign up</a>
            </p>
        </div>
    </div>

</body>
</html>
